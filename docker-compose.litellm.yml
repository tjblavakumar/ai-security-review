version: '3.8'

# =============================================================================
# AI Security Review with LiteLLM (Local AI)
# =============================================================================
# This docker-compose file adds LiteLLM service to run local LLMs
# Usage: docker-compose -f docker-compose.litellm.yml up --build
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Backend (FastAPI)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-review-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
    environment:
      - DATABASE_URL=sqlite:///./data/ai_security_review.db
      - CORS_ORIGINS=http://localhost:3000
      - LLM_PROVIDER=litellm
      - LITELLM_API_BASE=http://litellm:4000
      - LITELLM_API_KEY=sk-1234
      - LITELLM_MODEL_ID=ollama/llama2
      - LITELLM_EMBEDDING_MODEL=ollama/nomic-embed-text
      - AI_SUGGESTION_ENABLED=true
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - litellm
    networks:
      - ai-review-network

  # ---------------------------------------------------------------------------
  # Frontend (Next.js)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-review-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    command: npm run dev
    depends_on:
      - backend
    networks:
      - ai-review-network

  # ---------------------------------------------------------------------------
  # LiteLLM Proxy
  # ---------------------------------------------------------------------------
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: ai-review-litellm
    ports:
      - "4000:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    environment:
      - LITELLM_MASTER_KEY=sk-1234
      # Point to host Ollama instance
      - OLLAMA_API_BASE=http://host.docker.internal:11434
    command: ["--config", "/app/config.yaml", "--port", "4000", "--detailed_debug"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai-review-network

networks:
  ai-review-network:
    driver: bridge

# =============================================================================
# SETUP INSTRUCTIONS
# =============================================================================
#
# 1. Install Ollama on your HOST machine (not in Docker):
#    curl -fsSL https://ollama.com/install.sh | sh
#
# 2. Pull models on HOST:
#    ollama pull llama2
#    ollama pull nomic-embed-text
#
# 3. Verify Ollama is running on HOST:
#    ollama list
#
# 4. Create litellm_config.yaml in project root:
#    cat > litellm_config.yaml << 'EOF'
#    model_list:
#      - model_name: ollama/llama2
#        litellm_params:
#          model: ollama/llama2
#          api_base: http://host.docker.internal:11434
#      
#      - model_name: ollama/nomic-embed-text
#        litellm_params:
#          model: ollama/nomic-embed-text
#          api_base: http://host.docker.internal:11434
#    EOF
#
# 5. Start services:
#    docker-compose -f docker-compose.litellm.yml up --build
#
# 6. Test the setup:
#    # Check if LiteLLM is healthy
#    curl http://localhost:4000/health
#
#    # Check AI status
#    curl http://localhost:8000/api/ai/status
#
#    # Test from backend container
#    docker exec ai-review-backend python test_llm_provider.py
#
# 7. Re-index policies:
#    Go to http://localhost:3000/admin/policies
#    Click "Re-index" for each policy document
#
# =============================================================================
# TROUBLESHOOTING
# =============================================================================
#
# Issue: "Connection refused to host.docker.internal:11434"
# Solution: Ensure Ollama is running on HOST (not in Docker)
#          Check: ollama list
#
# Issue: "Model not found"
# Solution: Pull models on HOST: ollama pull llama2
#
# Issue: LiteLLM container exits immediately
# Solution: Check litellm_config.yaml exists and is valid
#
# Issue: Slow responses
# Solution: Ensure your machine has sufficient RAM (8GB+ recommended)
#          Consider using smaller models like llama2 (7B) vs llama3 (8B)
#
# Issue: Want to use GPU acceleration
# Solution: Install Ollama with GPU support on HOST
#          Verify: ollama run llama2 "test"
#
# =============================================================================
# PERFORMANCE NOTES
# =============================================================================
#
# CPU-only (Intel i7, 16GB RAM):
# - llama2 (7B): ~5-10 seconds per response
# - Embeddings: ~1-2 seconds per document chunk
#
# GPU (NVIDIA RTX 3080, 10GB VRAM):
# - llama2 (7B): ~1-3 seconds per response
# - Embeddings: ~0.5 seconds per document chunk
#
# For better performance:
# - Use GPU-enabled host machine
# - Use smaller models (llama2 vs llama3)
# - Reduce max_tokens in prompts
# - Use quantized models (Q4, Q5)
#
# =============================================================================
