# =============================================================================
# LiteLLM Configuration File
# =============================================================================
# This configuration file tells LiteLLM how to connect to your local Ollama
# instance and which models to make available.
#
# Usage:
# 1. Ensure Ollama is running: ollama list
# 2. Start LiteLLM: litellm --config litellm_config.yaml --port 4000
# 3. Or use with Docker Compose (see docker-compose.litellm.yml)
# =============================================================================

# Model definitions
model_list:
  # ---------------------------------------------------------------------------
  # Chat Model (for AI suggestions and chat assistant)
  # ---------------------------------------------------------------------------
  - model_name: ollama/llama2
    litellm_params:
      model: ollama/llama2
      api_base: http://localhost:11434  # Change to host.docker.internal:11434 in Docker
      # Optional parameters:
      # temperature: 0.5
      # max_tokens: 2000
      # top_p: 0.9

  # ---------------------------------------------------------------------------
  # Alternative Chat Models (uncomment to use)
  # ---------------------------------------------------------------------------
  # Llama 3 (8B) - Better quality, slower
  # - model_name: ollama/llama3
  #   litellm_params:
  #     model: ollama/llama3
  #     api_base: http://localhost:11434

  # Mistral (7B) - Fast and efficient
  # - model_name: ollama/mistral
  #   litellm_params:
  #     model: ollama/mistral
  #     api_base: http://localhost:11434

  # CodeLlama (for code-heavy security questions)
  # - model_name: ollama/codellama
  #   litellm_params:
  #     model: ollama/codellama
  #     api_base: http://localhost:11434

  # ---------------------------------------------------------------------------
  # Embedding Model (for RAG / policy document search)
  # ---------------------------------------------------------------------------
  - model_name: ollama/nomic-embed-text
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://localhost:11434

  # ---------------------------------------------------------------------------
  # Alternative Embedding Models (uncomment to use)
  # ---------------------------------------------------------------------------
  # all-minilm (smaller, faster)
  # - model_name: ollama/all-minilm
  #   litellm_params:
  #     model: ollama/all-minilm
  #     api_base: http://localhost:11434

  # ---------------------------------------------------------------------------
  # Vision Model (optional, for future image analysis)
  # ---------------------------------------------------------------------------
  - model_name: ollama/llava
    litellm_params:
      model: ollama/llava
      api_base: http://localhost:11434

# =============================================================================
# General Settings
# =============================================================================

# Enable detailed logging (helpful for debugging)
litellm_settings:
  set_verbose: true
  # json_logs: true
  
  # Cache settings (optional, speeds up repeated requests)
  # cache: true
  # cache_params:
  #   type: "redis"
  #   host: "localhost"
  #   port: 6379

  # Success callback (optional, for usage tracking)
  # success_callback: ["langfuse"]

# =============================================================================
# SETUP INSTRUCTIONS
# =============================================================================
#
# Step 1: Install Ollama
# ----------------------
# macOS/Linux:
#   curl -fsSL https://ollama.com/install.sh | sh
#
# Windows:
#   Download from https://ollama.com/download/windows
#
# Step 2: Pull Required Models
# -----------------------------
# ollama pull llama2                # Chat model
# ollama pull nomic-embed-text      # Embedding model
# ollama pull llava                 # Vision model (optional)
#
# Step 3: Verify Models
# ----------------------
# ollama list
#
# Step 4: Test a Model
# --------------------
# ollama run llama2 "Hello, how are you?"
#
# Step 5: Start LiteLLM
# ---------------------
# litellm --config litellm_config.yaml --port 4000
#
# Step 6: Test LiteLLM
# --------------------
# curl http://localhost:4000/health
# curl http://localhost:4000/model/info
#
# =============================================================================
# MODEL RECOMMENDATIONS
# =============================================================================
#
# For CHAT (AI Suggestions):
# --------------------------
# - llama2 (7B)       → Good balance, 8GB RAM, ~5-10s response
# - llama3 (8B)       → Better quality, 10GB RAM, ~10-15s response
# - mistral (7B)      → Fast, efficient, 8GB RAM, ~3-7s response
# - codellama (7B)    → Best for code/tech questions, 8GB RAM
#
# For EMBEDDINGS (RAG):
# ---------------------
# - nomic-embed-text  → Recommended, 384 dims, 2GB RAM
# - all-minilm        → Faster, smaller, 384 dims, 1GB RAM
#
# For VISION (Future):
# --------------------
# - llava (7B)        → Image understanding, 10GB RAM
# - bakllava (7B)     → Alternative vision model
#
# =============================================================================
# HARDWARE REQUIREMENTS
# =============================================================================
#
# Minimum (CPU-only):
# - RAM: 8GB (for llama2)
# - CPU: 4 cores
# - Speed: ~5-10 seconds per response
#
# Recommended (CPU):
# - RAM: 16GB
# - CPU: 8 cores
# - Speed: ~3-7 seconds per response
#
# Optimal (GPU):
# - RAM: 16GB
# - GPU: NVIDIA RTX 3060+ (8GB VRAM)
# - Speed: ~1-3 seconds per response
#
# =============================================================================
# DOCKER USAGE
# =============================================================================
#
# When using with Docker, change api_base to:
#   api_base: http://host.docker.internal:11434
#
# This allows the Docker container to access Ollama running on the host.
#
# =============================================================================
# TROUBLESHOOTING
# =============================================================================
#
# Issue: "Connection refused"
# Solution: Ensure Ollama is running: ollama list
#
# Issue: "Model not found"
# Solution: Pull the model: ollama pull llama2
#
# Issue: "Out of memory"
# Solution: Use a smaller model or quantized version
#          ollama pull llama2:7b-q4_0  # 4-bit quantization
#
# Issue: Slow responses
# Solution: 
#   1. Use GPU if available
#   2. Use smaller model (mistral vs llama3)
#   3. Reduce max_tokens in app config
#
# =============================================================================
